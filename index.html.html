<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jio AirFiber Daily Installation Report</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f4f7fb;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,0.15);
}

.header{
    background:linear-gradient(135deg,#0052cc,#0099ff);
    color:white;
    text-align:center;
    padding:30px 20px;
}

.logo{
    width:100px;
    height:100px;
    background:white;
    color:#0052cc;
    border-radius:50%;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    font-weight:bold;
    margin-bottom:15px;
}

.header h1{
    font-size:40px;
    font-weight:900;
    letter-spacing:2px;
}

.header p{
    margin-top:10px;
    font-size:18px;
}

.form-container{
    padding:30px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    font-weight:bold;
    margin-bottom:6px;
    color:#333;
}

input[type="text"],
input[type="tel"],
input[type="date"],
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:14px;
}

textarea{
    resize:vertical;
}

.radio-group{
    display:flex;
    gap:20px;
    margin-top:8px;
}

.radio-group label{
    font-weight:normal;
}

button{
    width:100%;
    background:#0052cc;
    color:white;
    border:none;
    padding:15px;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#003d99;
}

.footer{
    text-align:center;
    padding:15px;
    color:#777;
    font-size:13px;
}

@media(max-width:768px){

    .header h1{
        font-size:28px;
    }

    .radio-group{
        flex-direction:column;
        gap:8px;
    }

    .form-container{
        padding:20px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <div class="logo">Jio</div>
    <h1>DAILY INSTALLATION REPORT</h1>
    <p>Jio AirFiber Installation Tracking Form</p>
</div>

<div class="form-container">

<form>

<div class="form-group">
<label>1. JP ID (Ex - IVAQ)</label>
<input type="text" required>
</div>

<div class="form-group">
<label>2. Date of Installation</label>
<input type="date" required>
</div>

<div class="form-group">
<label>3. ORN Number</label>
<input type="text" required>
</div>

<div class="form-group">
<label>4. Customer Name - As per Installation</label>
<input type="text" required>
</div>

<div class="form-group">
<label>5. Customer Mobile Number - As per Installation</label>
<input type="tel" maxlength="10" required>
</div>

<div class="form-group">
<label>6. Installation Address</label>
<textarea rows="3" required></textarea>
</div>

<div class="form-group">
<label>7. P1 or P2 Installation</label>
<div class="radio-group">
<label><input type="radio" name="ptype" required> P1</label>
<label><input type="radio" name="ptype"> P2</label>
</div>
</div>

<div class="form-group">
<label>8. ODU RSN Number</label>
<input type="text" required>
</div>

<div class="form-group">
<label>9. IDU RSN Number</label>
<input type="text" required>
</div>

<div class="form-group">
<label>10. STB RSN Number</label>
<input type="text" required>
</div>

<div class="form-group">
<label>11. RMDU RSN Number (If P2 Installation | If P1 Enter 0)</label>
<input type="text">
</div>

<div class="form-group">
<label>12. HSI Done</label>
<div class="radio-group">
<label><input type="radio" name="hsi" required> Yes</label>
<label><input type="radio" name="hsi"> No</label>
</div>
</div>

<div class="form-group">
<label>13. OTT Done</label>
<div class="radio-group">
<label><input type="radio" name="ott" required> Yes</label>
<label><input type="radio" name="ott"> No</label>
</div>
</div>

<div class="form-group">
<label>14. Secondary Agent Name</label>
<input type="text" required>
</div>

<div class="form-group">
<label>15. Secondary Agent Mobile Number</label>
<input type="tel" maxlength="10" required>
</div>

<button type="submit">
SUBMIT INSTALLATION REPORT
</button>

</form>

</div>

<div class="footer">
© Jio AirFiber Installation Reporting System
</div>

</div>

</body>
</html>
